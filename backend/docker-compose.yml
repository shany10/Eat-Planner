services:
  web:
    build:
      context: .
      dockerfile: dockerfile
    ports:
      - "${NODE_PORT:-3000}:3000"
    environment:
      NODE_ENV: "development"
      MONGODB_URI: "${MONGODB_URI:-mongodb://root:example@mongo:27017/mydb?authSource=admin}"
      NODE_PORT: "3000"
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    # command: sh -c "npm run build && npm run dev"

  mongo:
    image: mongo:6.0
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_USER:-root}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_PASS:-example}"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  node_modules:
  mongo-data:
