services:
  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    environment:
      NODE_ENV: "development"
      NODE_PORT: "3000"
      MAIL_MODE: "smtp"
      MAIL_HOST: "mailpit"
      MAIL_PORT: "1025"
      MAIL_SECURE: "false"
      MAIL_TLS_REJECT_UNAUTHORIZED: "false"
      MAIL_FROM: "Eat Planner <orders@eatplanner.local>"
      MAIL_APP_NAME: "Eat Planner"
      SMTP_MODE: "smtp"
      SMTP_HOST: "mailpit"
      SMTP_PORT: "1025"
      SMTP_SECURE: "false"
      SMTP_TLS_REJECT_UNAUTHORIZED: "false"
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: "Eat Planner <orders@eatplanner.local>"
      SMTP_APP_NAME: "Eat Planner"
    depends_on:
      mongo:
        condition: service_healthy
      mailpit:
        condition: service_started
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build: ./frontend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: "development"
      NUXT_DEVTOOLS: "false"
      NITRO_HOST: "0.0.0.0"
      NITRO_PORT: "3001"
      NUXT_BACKEND_BASE_URL: "http://backend:3000"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      NUXT_PUBLIC_GOOGLE_CLIENT_ID: "${NUXT_PUBLIC_GOOGLE_CLIENT_ID}"
      NUXT_PUBLIC_SENTRY_DSN: "${NUXT_PUBLIC_SENTRY_DSN}"
      SENTRY_SERVER_DSN: "${SENTRY_SERVER_DSN}"
      NUXT_PUBLIC_UMAMI_SRC: "${NUXT_PUBLIC_UMAMI_SRC}"
      NUXT_PUBLIC_UMAMI_WEBSITE_ID: "${NUXT_PUBLIC_UMAMI_WEBSITE_ID}"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    develop:
      watch:
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend/package-lock.json
        - action: rebuild
          path: ./frontend/pnpm-lock.yaml
        - action: rebuild
          path: ./frontend/Dockerfile

  mongo:
    image: mongo:6.0
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  backend_node_modules:
  frontend_node_modules:
  mongo-data:
