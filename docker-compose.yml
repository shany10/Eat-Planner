services:
  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  frontend:
    build: ./frontend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: "development"
      NUXT_DEVTOOLS: "false"
      NUXT_BACKEND_BASE_URL: "http://backend:3000"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
    volumes:
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - node_modules/
            - .nuxt/
            - .output/
            - dist/
            - .git/
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend/package-lock.json
        - action: rebuild
          path: ./frontend/pnpm-lock.yaml
        - action: rebuild
          path: ./frontend/Dockerfile

  mongo:
    image: mongo:6.0
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
    volumes:
      - mongo-data:/data/db

volumes:
  backend_node_modules:
  frontend_node_modules:
  mongo-data:
