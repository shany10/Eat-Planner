# -----------------------------------------------------------------------------
# Production stack (VPS).
#
# IMPORTANT: this file exposes the app in plain HTTP on ports 3000/3001. On a VPS
# you MUST put a reverse proxy in front (Caddy / Traefik / Nginx) that terminates
# TLS and serves everything over HTTPS, because:
#   - getUserMedia() (camera/mic for the video call) is blocked without HTTPS;
#   - Socket.IO upgrades to secure WebSocket (wss://) only over HTTPS.
# Suggested routing: mydomain.com -> frontend:3001, api.mydomain.com -> backend:3000.
# Once a proxy is in place, prefer binding these ports to 127.0.0.1 (e.g.
# "127.0.0.1:3000:3000") so only the proxy is reachable from the internet.
# -----------------------------------------------------------------------------
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    environment:
      NODE_ENV: "production"
      NODE_PORT: "3000"
      # Allowed browser origins for the Socket.IO video signaling (comma-separated).
      # Must include your public frontend domain in production.
      CORS_ORIGIN: "${CORS_ORIGIN}"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      # DSN Sentry passes au build pour embarquer @sentry/nuxt (module decide au
      # build). Sans ca, le suivi d'erreurs frontend/SSR ne serait pas inclus.
      args:
        NUXT_PUBLIC_SENTRY_DSN: "${NUXT_PUBLIC_SENTRY_DSN}"
        SENTRY_SERVER_DSN: "${SENTRY_SERVER_DSN}"
    environment:
      NODE_ENV: "production"
      NITRO_HOST: "0.0.0.0"
      NITRO_PORT: "3001"
      NUXT_BACKEND_BASE_URL: "http://backend:3000"
      # Public HTTPS URL of the backend Socket.IO server, as seen by the browser
      # (e.g. https://api.mydomain.com). Without this the video call cannot connect.
      NUXT_PUBLIC_REALTIME_BASE_URL: "${NUXT_PUBLIC_REALTIME_BASE_URL}"
      # WebRTC ICE servers. TURN is required in production behind strict NAT.
      NUXT_PUBLIC_STUN_URL: "${NUXT_PUBLIC_STUN_URL:-stun:stun.l.google.com:19302}"
      NUXT_PUBLIC_TURN_URL: "${NUXT_PUBLIC_TURN_URL}"
      NUXT_PUBLIC_TURN_USERNAME: "${NUXT_PUBLIC_TURN_USERNAME}"
      NUXT_PUBLIC_TURN_CREDENTIAL: "${NUXT_PUBLIC_TURN_CREDENTIAL}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      NUXT_PUBLIC_GOOGLE_CLIENT_ID: "${NUXT_PUBLIC_GOOGLE_CLIENT_ID}"
      NUXT_PUBLIC_SENTRY_DSN: "${NUXT_PUBLIC_SENTRY_DSN}"
      SENTRY_SERVER_DSN: "${SENTRY_SERVER_DSN}"
      NUXT_PUBLIC_UMAMI_SRC: "${NUXT_PUBLIC_UMAMI_SRC}"
      NUXT_PUBLIC_UMAMI_WEBSITE_ID: "${NUXT_PUBLIC_UMAMI_WEBSITE_ID}"
    ports:
      - "3001:3001"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  mongo:
    image: mongo:6.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongo-data:
